[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false

remappings = [
  "@openzeppelin/=lib/openzeppelin-contracts/",
  "@uniswap/v2-core/=lib/v2-core/",
  "@uniswap/v2-periphery/=lib/v2-periphery/",
  "@pythnetwork/pyth-sdk-solidity/=lib/pyth-sdk-solidity/",
  "forge-std/=lib/forge-std/src/",
]

[rpc_endpoints]
hsk_testnet = "https://testnet.hsk.xyz"
hsk_mainnet = "https://mainnet.hsk.xyz"

[etherscan]
hsk_testnet = { key = "any", url = "https://testnet-explorer.hsk.xyz/api" }
hsk_mainnet = { key = "any", url = "https://hashkey.blockscout.com/api" }
